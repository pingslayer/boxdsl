system: "SimpleEMS"

global:
  constraints:
    - "Use clean architecture boundaries"
    - "Ensure stateless service logic"
    - "Maintain high professional coding standards and consistency"
    - "Ensure a consistent UI/UX design language across all modules"
  infrastructure:
    - "Laravel (PHP 8.2+)"
    - "Vue.js (Frontend Framework)"
    - "Apache (Web Server)"
    - "MySQL 8.0"

boxes:
  # --- Logic Layer ---
  - name: "EmployeeService"
    type: "service"
    responsibility: "Orchestrates employee lifecycle operations and business validation."
    depends_on:
      - "EmployeeRepository"
    inputs:
      - "EmployeeData"
      - "ActionType"
    outputs:
      - "EmployeeID"
      - "OperationStatus"

  # --- Persistence Layer ---
  - name: "EmployeeRepository"
    type: "repository"
    responsibility: "Handles all database operations for employee records."
    constraints:
      - "database_access"
    inputs:
      - "Query"
      - "RecordData"
    outputs:
      - "DatabaseResult"

  # --- Interface Layer ---
  - name: "HttpApiAdapter"
    type: "adapter"
    responsibility: "Exposes REST endpoints for the Employee Management System."
    depends_on:
      - "EmployeeService"
