# ==============================================================================
# BoxDSL: Architecture Master Template
# ==============================================================================
# This document defines the software architecture for an AI-driven SDLC.
# 
# Instructions:
# 1. Use this file as a reference for syntax and architectural best practices.
# 2. Copy the contents to 'architecture.yaml' to trigger the BoxDSL Engine.
# 3. The Engine will validate your graph and generate orchestration documents.
# ==============================================================================

# 1. System Identity
# ------------------
# The root name of your application. Used as context in all generated docs.
system: "EnterpriseStore"

# 2. Global Constraints
# ---------------------
# These rules are enforced system-wide. Every module (box) created will 
# automatically inherit these constraints in their orchestration blueprints.
global:
  constraints:
    - "Strict adherence to Clean Architecture principles"
    - "All business logic must be platform-agnostic (Type-only implementation)"
    - "Ensure GDPR compliance for all data handling"
    - "Professional coding standards (SOLID, DRY) are mandatory"

# 3. Global Infrastructure (The Environment)
# ----------------------------------------
# Define your tech stack here. Note: BoxDSL automatically enforces Docker and 
# Docker Compose orchestration by default in the generated blueprints.
  infrastructure:
    - "Base Runtime: Node.js 20 (Alpine)"
    - "Database: PostgreSQL 15"
    - "Cache: Redis 7"

# 3. Box Definitions (The Graph)
# ------------------------------
# Define your modules here. Each box represents an isolated unit of software.
boxes:

  # --- Example: A Business Logic Service ---
  - name: "OrderService"
    type: "service" # Roles: service, repository, adapter
    responsibility: "Orchestrates the lifecycle of a customer order from creation to fulfillment."
    
    # Box-Level Constraints: Specific to this module only.
    constraints:
      - "stateless: No internal session state allowed"
      - "transactional: All order operations must be atomic"
    
    # Interface Specification: The "Data Contract" for the AI/Developer.
    inputs:
      - "OrderPayload"
      - "CustomerID"
    outputs:
      - "OrderID"
      - "FulfillmentStatus"

    # Dependency Map: Modules this box is allowed to communicate with.
    # The Engine will check for missing boxes and circular loops (e.g., A -> B -> A).
    depends_on:
      - "InventoryRepository"
      - "PaymentAdapter"

  # --- Example: A Data Persistence Layer ---
  - name: "InventoryRepository"
    type: "repository"
    responsibility: "Handles persistence and querying for stock levels and product catalogs."
    constraints:
      - "database_access: Direct read/write permitted"
      - "caching: Must implement a 5-minute TTL on stock queries"
    inputs:
      - "ProductID"
      - "QuantityDelta"
    outputs:
      - "CurrentStockLevel"

  # --- Example: External System Adapter ---
  - name: "PaymentAdapter"
    type: "adapter"
    responsibility: "Integrates with Stripe API for secure credit card processing."
    constraints:
      - "external_api_access: Authorized to communicate with stripe.com"
      - "no_local_storage: Credit card data must never touch the local database"
    inputs:
      - "OrderID"
      - "Amount"
      - "PaymentMethodID"
    outputs:
      - "TransactionHash"
      - "SuccessFlag"

# ==============================================================================
# PRO-TIP: 
# Once you save your 'architecture.yaml', run 'npm start' in the core folder.
# The engine will generate isolated .md blueprints in 'workspace/docs/'.
# ==============================================================================
